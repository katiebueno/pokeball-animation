<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Reveal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }

  /* ── Starfield ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d, 2s) ease-in-out infinite alternate;
    opacity: var(--o, 0.6);
  }
  @keyframes twinkle { to { opacity: 0.1; transform: scale(0.5); } }

  /* ── Stage — ball and pokemon share this space ── */
  .stage {
    position: relative;
    z-index: 10;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Pokéball ── */
  .pokeball-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: ballFloat 3s ease-in-out infinite;
  }
  @keyframes ballFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  /* Mega Pokéball — uses a different color scheme */
  .pokeball-wrap.mega-ball .ball-top-fill { fill: url(#megaTopGrad) !important; }
  .pokeball-wrap.mega-ball .ball-bottom-fill { fill: url(#megaBotGrad) !important; }

  /* Shadow Pokéball — dark purple scheme */
  .pokeball-wrap.shadow-ball .ball-top-fill { fill: url(#shadowTopGrad) !important; }
  .pokeball-wrap.shadow-ball .ball-bottom-fill { fill: url(#shadowBotGrad) !important; }

  .pokeball {
    width: 150px;
    height: 150px;
    position: relative;
    filter: drop-shadow(0 0 24px rgba(220, 50, 50, 0.6));
    animation: ballSpin 0.5s ease-in-out 0.3s 2;
  }
  .pokeball.mega-style  { filter: drop-shadow(0 0 28px rgba(0, 180, 255, 0.8)); }
  .pokeball.shadow-style { filter: drop-shadow(0 0 28px rgba(140, 0, 200, 0.8)); }

  @keyframes ballSpin {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(-12deg); }
    75%  { transform: rotate(12deg); }
    100% { transform: rotate(0deg); }
  }

  .ball-top {
    transform-origin: center bottom;
    transition: transform 0.55s cubic-bezier(0.25, 1.0, 0.5, 1);
  }
  .ball-bottom {
    transform-origin: center top;
    transition: transform 0.55s cubic-bezier(0.25, 1.0, 0.5, 1);
  }
  .pokeball.open .ball-top    { transform: translateY(-110px) rotate(-40deg); }
  .pokeball.open .ball-bottom { transform: translateY(110px) rotate(40deg); }

  .ball-center { transition: opacity 0.1s ease; }
  .pokeball.open .ball-center { opacity: 0; }

  /* ── Pokémon image ── */
  .pokemon-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pokemon-glow {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,0,0.25) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }
  /* Shadow glow is purple */
  .pokemon-glow.shadow-glow {
    background: radial-gradient(circle, rgba(160,0,255,0.35) 0%, transparent 70%);
  }
  /* Mega glow is blue/gold */
  .pokemon-glow.mega-glow {
    background: radial-gradient(circle, rgba(0,180,255,0.35) 0%, transparent 70%);
  }
  .pokemon-glow.revealed { opacity: 1; }

  .pokemon-img {
    width: 145px;
    height: 145px;
    object-fit: contain;
    filter: brightness(0);
    opacity: 0;
    transform: scale(0.5);
    transition:
      filter 0.7s ease,
      opacity 0.5s ease,
      transform 0.6s cubic-bezier(0.34, 1.4, 0.64, 1);
  }

  /* Standard reveal */
  .pokemon-img.revealed {
    filter: brightness(1) drop-shadow(0 0 14px rgba(255, 220, 0, 0.7));
    opacity: 1;
    transform: scale(1);
  }

  /* Shadow reveal — purple tinted drop shadow */
  .pokemon-img.revealed.shadow-form {
    filter: brightness(1)
            drop-shadow(0 0 16px rgba(160, 0, 255, 0.9))
            drop-shadow(0 0 6px rgba(80, 0, 120, 0.8));
  }

  /* Mega reveal — electric blue glow */
  .pokemon-img.revealed.mega-form {
    filter: brightness(1)
            drop-shadow(0 0 16px rgba(0, 180, 255, 0.9))
            drop-shadow(0 0 6px rgba(0, 80, 160, 0.8));
  }

  /* ── Form badge ── */
  .form-badge {
    position: relative;
    z-index: 10;
    margin-top: 10px;
    font-size: 8px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    display: none;
  }
  .form-badge.shadow-badge {
    display: block;
    background: rgba(100, 0, 180, 0.8);
    color: #d9a0ff;
    border: 1px solid #9b30ff;
    text-shadow: 0 0 8px rgba(180,0,255,0.8);
  }
  .form-badge.mega-badge {
    display: block;
    background: rgba(0, 60, 140, 0.8);
    color: #80d4ff;
    border: 1px solid #00aaff;
    text-shadow: 0 0 8px rgba(0,180,255,0.8);
  }
  .form-badge.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Name ── */
  .pokemon-name {
    position: relative;
    z-index: 10;
    margin-top: 10px;
    font-size: 9px;
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255,220,0,0.8), 2px 2px 0 #000;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    text-align: center;
    max-width: 220px;
    word-break: break-word;
  }
  .pokemon-name.shadow-name { color: #d9a0ff; text-shadow: 0 0 10px rgba(180,0,255,0.8), 2px 2px 0 #000; }
  .pokemon-name.mega-name   { color: #80d4ff; text-shadow: 0 0 10px rgba(0,180,255,0.8), 2px 2px 0 #000; }
  .pokemon-name.revealed { opacity: 1; transform: translateY(0); }

  /* ── Error ── */
  .error-msg {
    color: rgba(255,255,255,0.4);
    font-size: 8px;
    text-align: center;
    line-height: 2;
    display: none;
    position: relative;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="stage">
  <div class="pokeball-wrap" id="ballWrap">
    <div class="pokeball" id="pokeball">
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" width="150" height="150">
        <defs>
          <clipPath id="topClip"><rect x="0" y="0" width="150" height="75"/></clipPath>
          <clipPath id="botClip"><rect x="0" y="75" width="150" height="75"/></clipPath>

          <!-- Standard red/white -->
          <radialGradient id="stdTopGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#ff6666"/>
            <stop offset="100%" stop-color="#cc0000"/>
          </radialGradient>
          <radialGradient id="stdBotGrad" cx="40%" cy="65%" r="60%">
            <stop offset="0%" stop-color="#eeeeee"/>
            <stop offset="100%" stop-color="#aaaaaa"/>
          </radialGradient>

          <!-- Mega — blue/gold -->
          <radialGradient id="megaTopGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#66aaff"/>
            <stop offset="100%" stop-color="#0044cc"/>
          </radialGradient>
          <radialGradient id="megaBotGrad" cx="40%" cy="65%" r="60%">
            <stop offset="0%" stop-color="#ffe066"/>
            <stop offset="100%" stop-color="#cc9900"/>
          </radialGradient>

          <!-- Shadow — dark purple/black -->
          <radialGradient id="shadowTopGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#9933cc"/>
            <stop offset="100%" stop-color="#440066"/>
          </radialGradient>
          <radialGradient id="shadowBotGrad" cx="40%" cy="65%" r="60%">
            <stop offset="0%" stop-color="#333355"/>
            <stop offset="100%" stop-color="#111122"/>
          </radialGradient>
        </defs>

        <!-- Top half -->
        <g class="ball-top" clip-path="url(#topClip)">
          <circle cx="75" cy="75" r="71" class="ball-top-fill" fill="url(#stdTopGrad)" stroke="#222" stroke-width="4"/>
          <ellipse cx="54" cy="45" rx="16" ry="9" fill="rgba(255,255,255,0.2)" transform="rotate(-20,54,45)"/>
        </g>

        <!-- Bottom half -->
        <g class="ball-bottom" clip-path="url(#botClip)">
          <circle cx="75" cy="75" r="71" class="ball-bottom-fill" fill="url(#stdBotGrad)" stroke="#222" stroke-width="4"/>
        </g>

        <!-- Center -->
        <g class="ball-center">
          <rect x="4" y="68" width="142" height="14" fill="#222"/>
          <circle cx="75" cy="75" r="14" fill="#fff" stroke="#222" stroke-width="4"/>
          <circle cx="75" cy="75" r="8"  fill="#ddd" stroke="#555" stroke-width="2"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- Pokémon -->
  <div class="pokemon-wrap">
    <div class="pokemon-glow" id="glow"></div>
    <img class="pokemon-img" id="pokeImg" src="" alt="Pokémon">
  </div>
</div>

<div class="form-badge" id="formBadge"></div>
<div class="pokemon-name" id="pokeName"></div>
<div class="error-msg" id="errorMsg">NO POKÉMON<br>PROVIDED</div>

<script>
  function getParam(k) { return new URLSearchParams(window.location.search).get(k); }

  const pokemonId   = getParam('id');
  const pokemonName = getParam('name') || '';
  const speciesId   = getParam('species_id') || '';  // e.g. "charizard-mega-x", "gengar_shadow"
  const isShadow    = (getParam('shadow') === '1') || speciesId.includes('shadow');
  const isMega      = (getParam('mega')   === '1') || speciesId.includes('mega');

  // ── Starfield ──────────────────────────────────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${(Math.random()*3+1).toFixed(1)}s;
      --o:${(Math.random()*0.6+0.1).toFixed(2)};
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // ── Elements ───────────────────────────────────────────────────────────────
  const pokeball  = document.getElementById('pokeball');
  const ballWrap  = document.getElementById('ballWrap');
  const pokeImg   = document.getElementById('pokeImg');
  const pokeName  = document.getElementById('pokeName');
  const formBadge = document.getElementById('formBadge');
  const glow      = document.getElementById('glow');
  const errorMsg  = document.getElementById('errorMsg');

  let revealed = false;
  let ready    = false;

  if (!pokemonId && !speciesId) {
    errorMsg.style.display = 'block';
  } else {
    // ── Style the ball and elements by form ─────────────────────────────────
    if (isMega) {
      ballWrap.classList.add('mega-ball');
      pokeball.classList.add('mega-style');
      glow.classList.add('mega-glow');
      pokeName.classList.add('mega-name');
      pokeball.style.filter = 'drop-shadow(0 0 28px rgba(0,180,255,0.8))';
      formBadge.textContent = '✦ MEGA';
      formBadge.classList.add('mega-badge');
    } else if (isShadow) {
      ballWrap.classList.add('shadow-ball');
      pokeball.classList.add('shadow-style');
      glow.classList.add('shadow-glow');
      pokeName.classList.add('shadow-name');
      formBadge.textContent = '★ SHADOW';
      formBadge.classList.add('shadow-badge');
    }

    // ── Determine sprite URL ─────────────────────────────────────────────────
    let spriteUrl;

    if (isMega && speciesId) {
      // Mega forms use species slug in PokéAPI
      // Convert PVPoke speciesId format to PokéAPI slug
      // PVPoke: "charizard_mega_x" → PokéAPI: "charizard-mega-x"
      const slug = speciesId.replace(/_/g, '-').replace('-shadow','');
      spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${slug}.png`;
    } else if (pokemonId) {
      // Standard and Shadow both use numeric ID for official artwork
      // Shadow has no separate official artwork — use standard with CSS effect
      spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokemonId}.png`;
    } else {
      spriteUrl = '';
    }

    pokeImg.src = spriteUrl;
    pokeName.textContent = pokemonName || (speciesId ? speciesId.replace(/_/g,' ') : `#${pokemonId}`);

    pokeImg.onload  = () => { ready = true; };
    pokeImg.onerror = () => {
      // Fallback to pixel sprite if official artwork fails
      if (pokemonId) {
        pokeImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemonId}.png`;
      }
      ready = true;
    };

    setTimeout(() => { if (ready && !revealed) triggerReveal(); }, 1200);
    setTimeout(() => { if (!revealed) triggerReveal(); }, 2500);
  }

  document.addEventListener('click', () => {
    if (!revealed && (pokemonId || speciesId)) triggerReveal();
  });

  function triggerReveal() {
    revealed = true;

    // Open ball
    setTimeout(() => {
      ballWrap.style.animation = 'none';
      pokeball.style.animation = 'none';
      pokeball.classList.add('open');
    }, 100);

    // Fade ball out
    setTimeout(() => {
      ballWrap.style.transition = 'opacity 0.55s ease';
      ballWrap.style.opacity    = '0';
      ballWrap.style.pointerEvents = 'none';
    }, 450);

    // Reveal Pokémon, name, and form badge simultaneously
    setTimeout(() => {
      // Apply form-specific CSS class to image
      if (isMega)        pokeImg.classList.add('mega-form');
      else if (isShadow) pokeImg.classList.add('shadow-form');

      pokeImg.classList.add('revealed');
      glow.classList.add('revealed');
      pokeName.classList.add('revealed');
      formBadge.classList.add('revealed');
    }, 950);
  }
</script>
</body>
</html>
